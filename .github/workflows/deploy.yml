name: Deploy to Hostinger VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            set -e

            APP_DIR="/var/www/soryouth-crm"

            echo ">>> Pulling latest code..."
            cd $APP_DIR
            git pull origin main

            echo ">>> Ensuring Chromium is installed for proposal sheet rendering..."
            if ! command -v chromium-browser &> /dev/null && ! command -v chromium &> /dev/null; then
              echo "Chromium not found. Installing..."
              sudo apt-get update && sudo apt-get install -y chromium-browser || sudo apt-get install -y chromium || echo "Warning: Could not install Chromium automatically. Please install manually."
            fi

            echo ">>> Installing dependencies..."
            npm ci --omit=dev

            echo ">>> Generating Prisma client..."
            npx prisma generate

            echo ">>> Running database migrations..."
            npx prisma migrate deploy

            echo ">>> Building Next.js app..."
            npm run build

            echo ">>> Restarting app with PM2..."
            pm2 restart soryouth-crm || pm2 start npm --name "soryouth-crm" -- start -- -p 3000

            echo ">>> Setting up proposal microservice environment..."
            cd $APP_DIR/microservices/proposal_generator
            if [ ! -d "venv" ]; then
              python3 -m venv venv
            fi
            source venv/bin/activate
            echo ">>> Installing python dependencies..."
            pip install --upgrade pip
            pip install -r requirements.txt

            echo ">>> Restarting proposal microservice..."
            pm2 restart proposal-service || pm2 start "python3 main.py" --name "proposal-service"

            pm2 save
            echo ">>> Deployment complete!"
