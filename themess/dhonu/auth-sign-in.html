<head>
        <meta charset="utf-8" />
        <title>Sign In | Dhonu - Responsive Bootstrap 5 Admin Dashboard Template</title>
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="description" content="Dhonu is a modern, responsive admin dashboard available on ThemeForest. Ideal for building CRM, CMS, project management tools, and custom web applications with a clean UI, flexible layouts, and rich features." />
        <meta name="keywords" content="Dhonu, admin dashboard, ThemeForest, Bootstrap 5 admin, responsive admin, CRM dashboard, CMS admin, web app UI, admin theme, premium admin template" />
        <meta name="author" content="Coderthemes" />

        <!-- App favicon -->
        <link rel="shortcut icon" href="assets/images/favicon.ico" />
 <!-- Theme Config Js -->
<script src="assets/js/config.js"></script>

<!-- Vendor css -->
<link href="assets/css/vendors.min.css" rel="stylesheet" type="text/css" />

<!-- App css -->
<link href="assets/css/app.min.css" rel="stylesheet" type="text/css" />

    </head>

    <body>
        <div class="auth-box overflow-hidden align-items-center d-flex">
            <div class="container">
                <div class="row justify-content-center">
                    <div class="col-xxl-4 col-md-6 col-sm-8">
                        <div class="auth-brand text-center mb-4">
                            <a href="index.html" class="logo-dark">
                                <img src="assets/images/logo-black.png" alt="dark logo" />
                            </a>
                            <a href="index.html" class="logo-light">
                                <img src="assets/images/logo.png" alt="logo" />
                            </a>
                            <h4 class="fw-bold mt-3">Welcome</h4>
                            <p class="text-muted w-lg-75 mx-auto">Let’s get you signed in. Enter your email and password to continue.</p>
                        </div>

                        <div class="card p-4">
                            <form action="https://coderthemes.com/dhonu/layouts/index.html">
                                <div class="mb-3">
                                    <label for="userEmail" class="form-label">
                                        Email address
                                        <span class="text-danger">*</span>
                                    </label>
                                    <div class="input-group">
                                        <input type="email" class="form-control" id="userEmail" placeholder="you@example.com" required />
                                    </div>
                                </div>

                                <div class="mb-3">
                                    <label for="userPassword" class="form-label">
                                        Password
                                        <span class="text-danger">*</span>
                                    </label>
                                    <div class="input-group">
                                        <input type="password" class="form-control" id="userPassword" placeholder="••••••••" required />
                                    </div>
                                </div>

                                <div class="d-flex justify-content-between align-items-center mb-3">
                                    <div class="form-check">
                                        <input class="form-check-input form-check-input-light fs-14" type="checkbox" id="rememberMe" />
                                        <label class="form-check-label" for="rememberMe">Keep me signed in</label>
                                    </div>
                                    <a href="auth-reset-pass.html" class="text-decoration-underline link-offset-3 text-muted">Forgot Password?</a>
                                </div>

                                <div class="d-grid">
                                    <button type="submit" class="btn btn-primary fw-semibold py-2">Sign In</button>
                                </div>
                            </form>

                            <p class="text-muted text-center mt-4 mb-0">
                                New here?
                                <a href="auth-sign-up.html" class="text-decoration-underline link-offset-3 fw-semibold">Create an account</a>
                            </p>
                        </div>

                        <p class="text-center text-muted mt-4 mb-0">
                            ©
                            <script>
                                document.write(new Date().getFullYear())
                            </script>
                            Dhonu — by
                            <span class="fw-bold">Coderthemes</span>
                        </p>
                    </div>
                </div>
            </div>
        </div>

        <!-- end auth-fluid-->
        <!-- Vendor js -->
        <script src="assets/js/vendors.min.js"></script>

        <!-- App js -->
        <script src="assets/js/app.js"></script>

    </body>
